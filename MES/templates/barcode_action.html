<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>MES Barcode Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <div class="max-w-md mx-auto bg-gray-800 p-6 rounded-xl shadow-lg text-center">
        <div class="mb-4">
            <input type="text" id="manual-pin" placeholder="Input PIN (Dummy Test)" 
                   class="bg-gray-700 text-white p-2 rounded w-full border border-gray-600 text-center">
            <button onclick="testManual()" class="mt-2 bg-blue-500 w-full p-2 rounded hover:bg-blue-600">
                Test Input PIN
            </button>
        </div>

        <div id="status-card" class="mt-6 p-4 border border-gray-600 rounded-lg">
            <p id="output-display" class="text-xl">Belum ada data</p>
        </div>
    </div>

    <script>
        const CURRENT_WO_ID = 45; 

        // Fungsi utama untuk menangani pengecekan (otomatis dari scanner atau manual)
        async function testManual() {
            const pin = document.getElementById('manual-pin').value;
            const output = document.getElementById('output-display');
            
            output.innerText = "Memproses...";

            try {
                const response = await fetch('/api/scan-operator', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pin: pin, workorder_id: CURRENT_WO_ID })
                });
                
                const result = await response.json();

                if (result.status === 'success') {
                    // Tampilan sukses
                    output.innerHTML = `
                        <div class="text-green-500">
                            <p class="font-bold">Berhasil! Mesin berjalan untuk:</p>
                            <p class="text-2xl">${result.employee.name}</p>
                        </div>`;
                } 
                else if (result.status === 'not_attended') {
                    // Tampilan jika belum absen (trigger pop-up)
                    if (confirm(result.message + "\n\nSilahkan melakukan absensi wajah terlebih dahulu!")) {
                        output.innerText = "Absen terlebih dahulu";
                        // Contoh redirect: window.location.href = "/halaman-absen";
                    } else {
                        output.innerText = "Absensi dibatalkan.";
                    }
                } 
                else {
                    // Tampilan error (operator tidak ditemukan)
                    output.innerHTML = `<p class="text-red-500">${result.message}</p>`;
                }
            } catch (error) {
                output.innerText = "Gagal terhubung ke server.";
            }
        }
    </script>
</body>
</html>
